name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  deploy:
    needs: check
    runs-on: ubuntu-latest
    env:
      PROD_URL: ${{ vars.PROD_URL || 'https://miaopian.top' }}
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '2022' }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER || 'root' }}
      PROD_ADMIN_USER: ${{ secrets.PROD_ADMIN_USER || 'admin' }}
      PROD_ADMIN_PASSWORD: ${{ secrets.PROD_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Check deployment secrets
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -eu
          missing=""
          [ -n "$PROD_SSH_HOST" ] || missing="$missing PROD_SSH_HOST"
          [ -n "$PROD_SSH_KEY" ] || missing="$missing PROD_SSH_KEY"
          [ -n "$PROD_ADMIN_PASSWORD" ] || missing="$missing PROD_ADMIN_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::notice::Skipping production deploy; missing GitHub secrets:$missing"
            echo "DEPLOY_READY=false" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_READY=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v4
        if: env.DEPLOY_READY == 'true'
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
        if: env.DEPLOY_READY == 'true'

      - name: Configure SSH
        if: env.DEPLOY_READY == 'true'
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -eu
          test -n "$PROD_SSH_HOST"
          test -n "$PROD_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/maopian-production
          chmod 600 ~/.ssh/maopian-production
          ssh-keyscan -p "$PROD_SSH_PORT" "$PROD_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        if: env.DEPLOY_READY == 'true'
        run: |
          set -eu
          ssh -i ~/.ssh/maopian-production -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" \
            'cd /opt/maopian-tools && git fetch origin main && git reset --hard origin/main && SKIP_PULL=1 sh scripts/deploy-production.sh'

      - name: Verify HTTP endpoints
        if: env.DEPLOY_READY == 'true'
        run: |
          set -eu
          curl -fsS "$PROD_URL/api/health" | grep -q '"ok":true'
          curl -fsS "$PROD_URL/me" | grep -q '公众号二维码'
